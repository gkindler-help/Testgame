<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>The Home Battle: Buyer Beware</title>
  <style>
    :root {
      --bg: #111827;
      --panel: rgba(0, 0, 0, 0.35);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --accent: #f59e0b;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      touch-action: none;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      position: fixed;
      inset: 0;
    }

    #game-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: linear-gradient(to bottom, #78c4ff 0%, #d7f0ff 60%, #d4f7d2 100%);
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    #boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
    }

    #boot-card {
      width: min(88vw, 520px);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 20px 18px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    #boot-card h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.05;
    }

    #boot-card p {
      margin: 8px 0;
      font-size: clamp(14px, 2.8vw, 18px);
      opacity: 0.96;
    }

    #boot-card .accent {
      color: var(--accent);
      font-weight: 700;
    }

    #boot-tip {
      margin-top: 12px;
      font-size: clamp(13px, 2.5vw, 16px);
      opacity: 0.88;
    }

    @media (orientation: landscape) {
      #boot-card {
        width: min(70vw, 640px);
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="boot-overlay">
    <div id="boot-card">
      <h1>The Home Battle:<br />Buyer Beware</h1>
      <p><span class="accent">Touch controls are built in.</span></p>
      <p>Left thumb = analog movement</p>
      <p>Right thumb = Jump / Shoot / Change Gun / Call Agent</p>
      <p id="boot-tip">Tap anywhere to begin. The game will try to enter fullscreen on your first touch.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script type="module" src="./main.js"></script>

  <script>
    const bootOverlay = document.getElementById('boot-overlay');
    const dismissOverlay = () => {
      if (bootOverlay) bootOverlay.style.display = 'none';
      window.removeEventListener('pointerdown', dismissOverlay);
    };
    window.addEventListener('pointerdown', dismissOverlay, { once: true });
  </script>
</body>
</html>
